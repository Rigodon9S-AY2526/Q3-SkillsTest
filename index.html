<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Q3 Skills Test</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>

    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div class="container p-3 mt-5 rounded">
    <center><h1>Member Sign-Up</h1></center>
    <hr>

    <br>
    <form action="confirmation.html">

        <h2>Student Details</h2>

        <label>Full Name</label>
        <input class="form-control w-80" type="text" id="fullName"required>

        <br>

        <h2>Ticket Selection</h2>

        <label>Quantity (₱250.00 each)</label>
        <input class="form-control w-80 text-center" type="number" id="ticketQty" value="0" min="0">

        <br>

        <hr>
        <div class="paymentd">
            <h2>Payment Method:</h2>
            
            <div class="form-check">
                <label>Subtotal:</label>
                <input class="displayz" type="text" id="subtotal" readonly>
                <br>
                <label>Admin Fee:</label>
                <input class="displayz" type="text" id="adminFee" readonly>
                <br><br>
                <label class="total">Total:</label>
                <input class="totaldisplay" type="text" id="totalPrice" readonly>
            </div>
        </div>

        <hr>

        <br>
        <button type="button" class="btn" onclick="displayPayment()">Complete Registration</button>

    </form>

    <div>

    <script src="script.js"></script>
</body>

</html>
